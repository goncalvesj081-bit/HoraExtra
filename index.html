<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horas Extras</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="dark"]{
  --bg:#0f1117;--bg2:#161b27;--surface:#1e2433;--surface2:#252d3d;--surface3:#2c3547;
  --border:#2e3a50;--border2:#3a4a60;--text:#e8edf5;--text2:#a0aec0;--muted:#5a6a82;
  --accent:#6366f1;--accent-bg:rgba(99,102,241,.12);--accent2:#8b5cf6;
  --green:#34d399;--green-bg:rgba(52,211,153,.12);
  --red:#f87171;--red-bg:rgba(248,113,113,.12);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.12);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.12);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.12);
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 8px 40px rgba(0,0,0,.6);
  --header-bg:#0a0d14;
}
:root[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e8eaf2;--surface:#fff;--surface2:#f5f6fa;--surface3:#eceef5;
  --border:#dde1ed;--border2:#c8cede;--text:#1a1f36;--text2:#4a5568;--muted:#8896b0;
  --accent:#6366f1;--accent-bg:rgba(99,102,241,.08);--accent2:#8b5cf6;
  --green:#059669;--green-bg:rgba(5,150,105,.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,.08);
  --shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --header-bg:#1a1f36;
}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* LOADING */
#loading{position:fixed;inset:0;background:rgba(10,13,20,.9);display:flex;align-items:center;justify-content:center;z-index:500;transition:opacity .3s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:40px;padding:8px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;align-items:center;gap:8px;z-index:400;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;box-shadow:var(--shadow)}
#toast.show{opacity:1}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
.tdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* HEADER */
header{background:var(--header-bg);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:16px}
.header-title{font-size:13px;font-weight:600;color:#fff;letter-spacing:.2px}
.header-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.erro{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-info{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.5px}
.sync-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;font-weight:500}
.sync-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
.theme-toggle{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s}
.theme-toggle:hover{background:rgba(255,255,255,.12);color:#fff}

/* NAV */
.nav-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;gap:0;overflow-x:auto}
.nav-bar::-webkit-scrollbar{height:0}
.nav-tab{padding:14px 18px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;letter-spacing:.2px}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}

/* MAIN */
.main{padding:24px 32px;max-width:1160px;margin:0 auto}

/* SECTIONS */
.section{display:none;animation:fadeUp .25s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CARDS KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,transparent);border-radius:14px 14px 0 0}
.kpi:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.kpi.g{--kc:var(--green)}.kpi.r{--kc:var(--red)}.kpi.b{--kc:var(--blue)}.kpi.a{--kc:var(--amber)}.kpi.p{--kc:var(--accent)}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:8px;font-weight:600}
.kpi-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.5px;line-height:1}
.kpi-val.green{color:var(--green)}.kpi-val.red{color:var(--red)}.kpi-val.amber{color:var(--amber)}.kpi-val.blue{color:var(--blue)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:3px 8px;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace}
.kpi-badge.up{background:var(--green-bg);color:var(--green)}
.kpi-badge.dn{background:var(--red-bg);color:var(--red)}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;transition:border-color .2s;margin-bottom:16px}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.panel-hint{font-size:10px;color:var(--muted);opacity:.6;text-transform:none;letter-spacing:0;font-weight:400}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* BAR CHART */
.bar-group{margin-bottom:22px}
.bar-month-lbl{font-size:14px;font-weight:600;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.bar-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:52px;flex-shrink:0}
.bar-track{flex:1;height:10px;background:var(--surface3);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.bar-fill.p{background:var(--amber)}.bar-fill.f{background:var(--green)}
.bar-fill.acc{background:var(--accent)}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);min-width:90px;text-align:right}
.legend{display:flex;gap:14px;margin-top:12px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* MONTH CARD */
.month-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:12px}
.month-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.month-name{font-size:16px;font-weight:700}
.month-pct{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;border-radius:20px}
.month-pct.up{background:var(--green-bg);color:var(--green)}
.month-pct.dn{background:var(--red-bg);color:var(--red)}
.month-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ms-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px;font-weight:600}
.ms-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.ms-val.g{color:var(--green)}.ms-val.r{color:var(--red)}.ms-val.a{color:var(--amber)}

/* SPARK */
.spark-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:16px}
.spark-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.spark-title{font-size:13px;font-weight:600}
.spark-trend{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green)}

/* DONUT */
.donut-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:24px;margin-bottom:16px}
.donut-legend{flex:1}
.dl-item{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.dl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dl-label{font-size:13px;color:var(--muted);flex:1}
.dl-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;margin-left:auto}

/* COMPARATIVO */
.comp-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.comp-head{display:grid;grid-template-columns:70px 1fr 1fr 70px;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.comp-th{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600}
.comp-row{display:grid;grid-template-columns:70px 1fr 1fr 70px;padding:9px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.comp-row:last-child{border-bottom:none}
.comp-row:hover{background:var(--surface2)}
.comp-td{font-family:'JetBrains Mono',monospace;font-size:12px;display:flex;align-items:center}
.comp-td.mu{color:var(--muted);font-size:11px}
.dpill{padding:2px 8px;border-radius:12px;font-size:10px;font-family:'JetBrains Mono',monospace}
.dpill.pos{background:var(--green-bg);color:var(--green)}
.dpill.neg{background:var(--red-bg);color:var(--red)}
.dpill.zero{background:var(--surface3);color:var(--muted)}

/* FILTROS */
.filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.filter-row h2{font-size:16px;font-weight:700;flex:1;min-width:160px}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:7px 12px;border-radius:9px;outline:none;cursor:pointer;transition:border-color .2s}
select:focus{border-color:var(--accent)}

/* MES TABS */
.mes-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.mes-tab{font-size:11px;font-weight:500;padding:6px 14px;border-radius:9px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s}
.mes-tab:hover{border-color:var(--border2);color:var(--text)}
.mes-tab.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);font-weight:600}

/* PROJEÇÃO */
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--green))}
.proj-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.proj-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin-bottom:4px}
.proj-title{font-size:15px;font-weight:700}
.proj-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 12px;border-radius:20px;white-space:nowrap}
.proj-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:14px;margin-bottom:16px}
.proj-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:3px}
.proj-stat-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.proj-prog-wrap{background:var(--surface3);border-radius:4px;height:5px;position:relative;overflow:hidden}
.proj-prog-bar{position:absolute;left:0;top:0;height:100%;border-radius:4px;transition:width .8s ease}
.proj-proj-bar{position:absolute;top:0;height:100%;border-radius:4px;opacity:.4}
.proj-footer{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:5px}

/* TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.tbl-head-row{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-head-row h3{font-size:13px;font-weight:600}
.tbl-head-row span{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.tbl-inner{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 14px;white-space:nowrap}
td.r{text-align:right}
td.mu{color:var(--muted)}
td.zo{color:var(--border)}
td.g{color:var(--green)}
td.rd{color:var(--red)}
.dbadge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:6px;font-family:'Inter',sans-serif}
.dbadge.we{background:var(--purple-bg);color:var(--purple)}
.dbadge.wd{background:var(--blue-bg);color:var(--blue)}
.td-month-sep{background:var(--bg2);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;padding:6px 14px;border-bottom:1px solid var(--border)}
.hoje-pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--accent-bg);color:var(--accent);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle}
tr.row-hoje{box-shadow:inset 3px 0 0 var(--accent)}

/* PAG */
.pag{display:flex;gap:8px;align-items:center;justify-content:flex-end;padding:10px 14px;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.pag button{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:6px 12px;border-radius:8px;cursor:pointer;transition:all .2s;font-weight:500}
.pag button:hover{border-color:var(--accent);color:var(--accent)}
.pag button:disabled{opacity:.3;cursor:default}

/* ANÁLISE */
.analise-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.insight-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden}
.insight-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--ic,var(--accent))}
.insight-card.green{--ic:var(--green)}.insight-card.red{--ic:var(--red)}.insight-card.amber{--ic:var(--amber)}.insight-card.blue{--ic:var(--blue)}.insight-card.purple{--ic:var(--purple)}
.insight-icon{font-size:22px;margin-bottom:10px}
.insight-title{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin-bottom:6px}
.insight-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;margin-bottom:6px;line-height:1.1}
.insight-val.green{color:var(--green)}.insight-val.red{color:var(--red)}.insight-val.amber{color:var(--amber)}.insight-val.blue{color:var(--blue)}
.insight-desc{font-size:12px;color:var(--text2);line-height:1.6}

.ranking-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:16px}
.ranking-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin-bottom:16px}
.ranking-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.ranking-row:last-child{border-bottom:none}
.ranking-pos{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:20px;flex-shrink:0}
.ranking-label{flex:1;font-size:12px;font-weight:500}
.ranking-bar-track{width:120px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;flex-shrink:0}
.ranking-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.ranking-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;min-width:60px;text-align:right}

.alerta-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:16px}
.alerta-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600;margin-bottom:14px}
.alerta-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:8px;margin-bottom:8px}
.alerta-row:last-child{margin-bottom:0}
.alerta-row.ok{background:var(--green-bg)}
.alerta-row.warn{background:var(--amber-bg)}
.alerta-row.bad{background:var(--red-bg)}
.alerta-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.alerta-row.ok .alerta-dot{background:var(--green)}
.alerta-row.warn .alerta-dot{background:var(--amber)}
.alerta-row.bad .alerta-dot{background:var(--red)}
.alerta-txt{font-size:12px;line-height:1.6;color:var(--text2)}
.alerta-txt strong{color:var(--text);font-weight:600}

@media(max-width:768px){.analise-grid{grid-template-columns:1fr}}

/* ERROR */
#err-state{text-align:center;padding:60px 20px;display:none}
#err-state.show{display:block}
#err-state h2{color:var(--red);font-size:15px;margin-bottom:8px;font-weight:600}
#err-state p{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

@media(max-width:768px){
  header{padding:0 16px}.nav-bar{padding:0 16px}.main{padding:16px}
  .kpi-grid{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}
  .month-stats{grid-template-columns:1fr 1fr}
  th:nth-child(5),td:nth-child(5),th:nth-child(7),td:nth-child(7){display:none}
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>
<div id="toast"><span class="tdot"></span><span id="toast-txt"></span></div>

<header>
  <div class="header-left">
    <span class="header-title">Horas Extras</span>
    <span class="sync-info" id="sync-info">—</span>
  </div>
  <div class="header-right">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="sync-dot syncing" id="sdot"></span>
    </div>
    <button class="sync-btn" onclick="carregar()">
      <span id="sync-icon">↻</span> Sincronizar
    </button>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
  </div>
</header>

<div class="nav-bar">
  <button class="nav-tab active" onclick="showTab('visao',this)">Visão Geral</button>
  <button class="nav-tab" onclick="showTab('mensal',this)">Por Mês</button>
  <button class="nav-tab" onclick="showTab('comparativo',this)">Comparativo</button>
  <button class="nav-tab" onclick="showTab('diario',this)">Registro Diário</button>
  <button class="nav-tab" onclick="showTab('analise',this)">✦ Análise</button>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeNiHmdEnupG0aooJ6fU4WTYvZnhGu0fpWuFEJUhcObhW4v1rn0VKpQIHLWcBDewqv1Q/exec";
var CORES=['#34d399','#fbbf24','#f87171','#60a5fa','#a78bfa','#2dd4bf'];
var FDS=['sabado','sábado','domingo'];
var POR_PAG=30;
var STATE={registros:[],monthly:[],comparativo:[],valorHora:23};
var filtrados=[],pagina=1,mesSel='todos';

// TEMA
function toggleTheme(){
  var el=document.documentElement, cur=el.getAttribute('data-theme');
  var next=cur==='dark'?'light':'dark';
  el.setAttribute('data-theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'🌙':'☀️';
}

// STATUS
function setSt(est,txt){
  var d=document.getElementById('sdot');
  d.className='sync-dot'+(est==='ok'?' ok':est==='err'?' erro':' syncing');
  document.getElementById('sync-info').textContent=txt;
}
function toast(msg,tipo){
  var t=document.getElementById('toast');
  document.getElementById('toast-txt').textContent=msg;
  t.className='show '+(tipo||'ok');
  setTimeout(function(){t.className=''},3000);
}
function loading(on){document.getElementById('loading').classList.toggle('hide',!on);}

// CARREGAR
function carregar(){
  loading(true); setSt('syncing','Sincronizando...');
  var old=document.getElementById('_jsonp');
  if(old) old.parentNode.removeChild(old);
  var timer=setTimeout(function(){loading(false);setSt('err','Timeout');toast('Tempo esgotado','err');},15000);
  window._cb=function(data){
    clearTimeout(timer); loading(false);
    if(data.status!=='ok'){setSt('err','Erro');toast(data.mensagem||'Erro','err');return;}
    STATE.valorHora=data.dados.valorHora||23;
    STATE.registros=data.dados.registros||[];
    if(!STATE.registros.length){setSt('err','Sem dados');toast('Nenhum registro encontrado','err');return;}
    STATE.registros.forEach(function(r){r.diaNorm=norm(r.dia);});
    processarMensal();
    renderAll();
    var agora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setSt('ok','Atualizado às '+agora);
    toast('Dados sincronizados!','ok');
  };
  var s=document.createElement('script');
  s.id='_jsonp'; s.src=SCRIPT_URL+'?callback=_cb';
  s.onerror=function(){clearTimeout(timer);loading(false);setSt('err','Falha');toast('Falha ao acessar o Apps Script','err');};
  document.head.appendChild(s);
}

function norm(d){
  return (d||'').toLowerCase()
    .replace(/ç/g,'c').replace(/ã/g,'a').replace(/á/g,'a')
    .replace(/é/g,'e').replace(/ê/g,'e').replace(/í/g,'i')
    .replace(/ó/g,'o').replace(/ô/g,'o').replace(/ú/g,'u');
}

// DATA HELPERS
function parseDataBR(str){var p=str.split('/');return new Date(Number(p[2]),Number(p[1])-1,Number(p[0]));}
function dataHoje(){var n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());}
function isFuturo(r){return parseDataBR(r.data)>dataHoje();}
function isHoje(r){return parseDataBR(r.data).getTime()===dataHoje().getTime();}

// PROCESSAR MENSAL
function processarMensal(){
  var map={};
  STATE.registros.forEach(function(r){
    if(!map[r.mesAno]){
      var p=r.mesAno.split('-');
      var lbl=new Date(Number(p[0]),Number(p[1])-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      map[r.mesAno]={key:r.mesAno,mes:lbl.charAt(0).toUpperCase()+lbl.slice(1),hProg:0,hFeito:0,vProg:0,vFeito:0};
    }
    map[r.mesAno].hProg+=r.hProg; map[r.mesAno].hFeito+=r.hFeit;
    map[r.mesAno].vProg+=r.vProg; map[r.mesAno].vFeito+=r.vFeit;
  });
  var arr=Object.values(map).sort(function(a,b){return a.key.localeCompare(b.key);});
  arr.forEach(function(m){
    m.pct=m.vProg>0?((m.vFeito-m.vProg)/m.vProg*100):0;
    m.diff=m.vFeito-m.vProg; m.hDiff=m.hFeito-m.hProg;
  });
  STATE.monthly=arr;
  if(arr.length>=2){
    var m1=arr[arr.length-2],m2=arr[arr.length-1];
    var r1=STATE.registros.filter(function(r){return r.mesAno===m1.key;});
    var r2=STATE.registros.filter(function(r){return r.mesAno===m2.key;});
    STATE.comparativo=[];
    var max=Math.max(r1.length,r2.length);
    for(var i=0;i<max;i++){
      STATE.comparativo.push({d:i+1,m1:m1.mes.substring(0,3),h1:r1[i]?r1[i].hFeit:null,m2:m2.mes.substring(0,3),h2:r2[i]?r2[i].hFeit:null});
    }
  }
}

// RENDER ALL
function renderAll(){
  renderVisao(); renderMensal(); renderComparativo(); renderAnalise();
  mesSel='todos'; construirMesTabs(); aplicarFiltros();
  setTimeout(animBars,80);
}

// VISÃO GERAL
function renderVisao(){
  var M=STATE.monthly;
  var totHP=M.reduce(function(s,m){return s+m.hProg;},0);
  var totHF=M.reduce(function(s,m){return s+m.hFeito;},0);
  var totVP=M.reduce(function(s,m){return s+m.vProg;},0);
  var totVF=M.reduce(function(s,m){return s+m.vFeito;},0);
  var dH=totHF-totHP,dV=totVF-totVP,pct=totHP>0?(totHF/totHP*100):0;
  var dias=STATE.registros.length;

  document.getElementById('kpi-grid').innerHTML=
    kpi('p','Total Programado',fr(totVP),'',fh(totHP)+'h programadas','')+
    kpi('g','Total Feito',fr(totVF),'green',fh(totHF)+'h realizadas','')+
    kpi(dH>=0?'g':'r','Diferença Horas',(dH>=0?'+':'')+fh(dH)+'h',dH>=0?'green':'red',dH>=0?'Acima do planejado':'Abaixo do planejado','')+
    kpi('a','Realização',pct.toFixed(1)+'%','amber',dias+' dias no período','')+
    kpi(dV>=0?'g':'r','Saldo Financeiro',(dV>=0?'+':'')+fr(dV),dV>=0?'green':'red',dV>=0?'Acima do programado':'Abaixo do programado','');

  var maxV=Math.max.apply(null,M.flatMap(function(m){return[m.vProg,m.vFeito];}));
  var bEl=document.getElementById('bars-main'); bEl.innerHTML='';
  M.forEach(function(m){
    var pp=(m.vProg/maxV*100).toFixed(1),fp=(m.vFeito/maxV*100).toFixed(1);
    bEl.innerHTML+='<div class="bar-group"><div class="bar-month-lbl">'+m.mes+'</div>'+
      bRow('Prog.',pp,fr(m.vProg),'p')+bRow('Feito',fp,fr(m.vFeito),'f')+'</div>';
  });

  var canvas=document.getElementById('donut'),ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,200,200);
  var dtot=M.reduce(function(s,m){return s+m.vFeito;},0),sa=-Math.PI/2;
  M.forEach(function(m,i){
    var sl=(m.vFeito/dtot)*2*Math.PI;
    ctx.beginPath();ctx.moveTo(100,100);ctx.arc(100,100,85,sa,sa+sl);ctx.closePath();
    ctx.fillStyle=CORES[i%CORES.length];ctx.fill();sa+=sl;
  });
  ctx.beginPath();ctx.arc(100,100,52,0,2*Math.PI);
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--surface').trim()||'#1e2433';
  ctx.fill();
  var leg=document.getElementById('donut-legend');leg.innerHTML='';
  M.forEach(function(m,i){
    var p=(m.vFeito/dtot*100).toFixed(1);
    leg.innerHTML+=
      '<div style="display:flex;align-items:center;gap:12px">'+
        '<div style="width:12px;height:12px;border-radius:50%;background:'+CORES[i%CORES.length]+';flex-shrink:0"></div>'+
        '<div style="flex:1">'+
          '<div style="font-size:13px;font-weight:500;color:var(--text)">'+m.mes+'</div>'+
          '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--muted)">'+fr(m.vFeito)+'</div>'+
        '</div>'+
        '<div style="font-family:\'JetBrains Mono\',monospace;font-size:14px;font-weight:600;color:'+CORES[i%CORES.length]+'">'+p+'%</div>'+
      '</div>';
  });
}

function kpi(cls,label,val,vcls,sub,badge){
  return '<div class="kpi '+cls+'">'+
    '<div class="kpi-label">'+label+'</div>'+
    '<div class="kpi-val'+(vcls?' '+vcls:'')+'">'+val+'</div>'+
    '<div class="kpi-sub">'+sub+'</div>'+
    (badge?'<span class="kpi-badge">'+badge+'</span>':'')+
  '</div>';
}
function bRow(lbl,pct,val,cls){
  return '<div class="bar-row"><div class="bar-lbl">'+lbl+'</div>'+
    '<div class="bar-track"><div class="bar-fill '+cls+'" style="width:0%" data-w="'+pct+'"></div></div>'+
    '<div class="bar-val">'+val+'</div></div>';
}

// POR MÊS
function renderMensal(){
  var M=STATE.monthly,mcEl=document.getElementById('month-cards');
  mcEl.innerHTML='';
  M.forEach(function(m){
    var up=m.pct>=0;
    mcEl.innerHTML+='<div class="month-card">'+
      '<div class="month-head"><div class="month-name">'+m.mes+'</div>'+
      '<div class="month-pct '+(up?'up':'dn')+'">'+(up?'▲ +':'▼ ')+m.pct.toFixed(2)+'%</div></div>'+
      '<div class="month-stats">'+
        ms('Programado',fr(m.vProg),'')+ms('Feito',fr(m.vFeito),'g')+ms('Diferença',fr(m.diff),up?'g':'r')+
        ms('H. Prog.',fh(m.hProg)+'h','')+ms('H. Feitas',fh(m.hFeito)+'h','g')+ms('H. Diff.',(m.hDiff>=0?'+':'')+fh(m.hDiff)+'h',m.hDiff>=0?'g':'r')+
      '</div></div>';
  });
  buildSpark(M);
  var maxP=Math.max.apply(null,M.map(function(m){return Math.abs(m.pct);}));
  var pEl=document.getElementById('bars-pct');pEl.innerHTML='';
  M.forEach(function(m){
    var w=(Math.abs(m.pct)/maxP*100).toFixed(1);
    pEl.innerHTML+='<div class="bar-row" style="margin-bottom:14px">'+
      '<div class="bar-lbl" style="width:70px">'+m.mes.substring(0,3)+'</div>'+
      '<div class="bar-track" style="height:8px"><div class="bar-fill acc" style="width:0%;background:'+(m.pct>=0?'var(--green)':'var(--red)')+'" data-w="'+w+'"></div></div>'+
      '<div class="bar-val" style="color:'+(m.pct>=0?'var(--green)':'var(--red)')+'">'+m.pct.toFixed(1)+'%</div></div>';
  });
}
function ms(lbl,val,cls){return '<div><div class="ms-label">'+lbl+'</div><div class="ms-val'+(cls?' '+cls:'')+'">'+val+'</div></div>';}

function buildSpark(monthly){
  var canvas=document.getElementById('spark');
  canvas.width=Math.max((canvas.parentElement.offsetWidth||300)-44,200);
  var ctx=canvas.getContext('2d'),vals=monthly.map(function(m){return m.hFeito;});
  if(vals.length<2) return;
  var max=Math.max.apply(null,vals),min=Math.min.apply(null,vals),w=canvas.width,h=60;
  var xs=vals.map(function(_,i){return(i/(vals.length-1))*w;});
  var ys=vals.map(function(v){return h-((v-min)/(max-min+1))*(h-14)-7;});
  var grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'rgba(52,211,153,.2)');grad.addColorStop(1,'rgba(52,211,153,0)');
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();ctx.moveTo(xs[0],ys[0]);
  xs.forEach(function(x,i){if(i>0)ctx.lineTo(x,ys[i]);});
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(xs[0],ys[0]);
  xs.forEach(function(x,i){if(i>0)ctx.lineTo(x,ys[i]);});
  ctx.strokeStyle='var(--green)';ctx.lineWidth=2;ctx.stroke();
  xs.forEach(function(x,i){
    ctx.beginPath();ctx.arc(x,ys[i],4,0,2*Math.PI);ctx.fillStyle='#34d399';ctx.fill();
    ctx.beginPath();ctx.arc(x,ys[i],2,0,2*Math.PI);ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--surface').trim()||'#1e2433';ctx.fill();
  });
  document.getElementById('spark-lbl').textContent=vals[vals.length-1]>vals[0]?'↑ Crescendo':'↓ Queda';
}

// COMPARATIVO
function renderComparativo(){
  var comp=STATE.comparativo;
  if(!comp.length) return;
  document.getElementById('comp-stitle').textContent=comp[0].m1+' × '+comp[0].m2+' — por dia';
  document.getElementById('comp-th1').textContent=comp[0].m1;
  document.getElementById('comp-th2').textContent=comp[0].m2;
  var el=document.getElementById('comp-rows');el.innerHTML='';
  comp.forEach(function(c){
    var delta=c.h1!=null&&c.h2!=null?+(c.h2-c.h1).toFixed(2):null;
    var cls=delta===null?'zero':delta>0?'pos':delta<0?'neg':'zero';
    var dStr=delta===null?'pend.':delta>0?'+'+delta:String(delta);
    el.innerHTML+='<div class="comp-row">'+
      '<div class="comp-td mu">dia '+c.d+'</div>'+
      '<div class="comp-td">'+(c.h1!=null&&c.h1>0?c.h1+'h':'<span style="color:var(--muted)">—</span>')+'</div>'+
      '<div class="comp-td">'+(c.h2!=null&&c.h2>0?c.h2+'h':'<span style="color:var(--muted)">—</span>')+'</div>'+
      '<div class="comp-td"><span class="dpill '+cls+'">'+dStr+'</span></div>'+
    '</div>';
  });
}

// CARD DE RESUMO (todos os meses)
function renderProjecao(){
  var hoje=dataHoje();
  var mesAtualKey=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');

  // Qual mês mostrar?
  var mesKey=mesSel==='todos'?mesAtualKey:mesSel;
  var regMes=STATE.registros.filter(function(r){return r.mesAno===mesKey;});
  if(!regMes.length) return '';

  var ehAtual=mesKey===mesAtualKey;
  var passados=regMes.filter(function(r){return !isFuturo(r);});
  var futuros=regMes.filter(function(r){return isFuturo(r);});
  var hFeitas=passados.reduce(function(s,r){return s+r.hFeit;},0);
  var hProgTotal=regMes.reduce(function(s,r){return s+r.hProg;},0);
  var vFeito=passados.reduce(function(s,r){return s+r.vFeit;},0);
  var vProg=regMes.reduce(function(s,r){return s+r.vProg;},0);
  var diasComHora=passados.filter(function(r){return r.hFeit>0;}).length||1;
  var media=hFeitas/diasComHora;
  var totalDias=regMes.length;

  var p=regMes[0].mesAno.split('-');
  var lbl=new Date(Number(p[0]),Number(p[1])-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  lbl=lbl.charAt(0).toUpperCase()+lbl.slice(1);

  if(ehAtual){
    // Mês atual: mostra projeção
    var projecao=hFeitas+(media*futuros.length);
    var diff=projecao-hProgTotal;
    var ok=projecao>=hProgTotal;
    var cor=ok?'var(--green)':'var(--amber)';
    var pctFeito=Math.min(hFeitas/hProgTotal*100,100).toFixed(1);
    var pctProj=Math.min((projecao-hFeitas)/hProgTotal*100,100-parseFloat(pctFeito)).toFixed(1);
    return '<div class="proj-card">'+
      '<div class="proj-top">'+
        '<div><div class="proj-label">Estimativa — '+lbl+'</div>'+
        '<div class="proj-title">'+(ok?'✓ No caminho certo':'⚠ Abaixo do esperado')+'</div></div>'+
        '<div class="proj-badge" style="background:'+(ok?'var(--green-bg)':'var(--amber-bg)')+';color:'+cor+'">'+(diff>=0?'+':'')+fh(diff)+'h vs meta</div>'+
      '</div>'+
      '<div class="proj-stats">'+
        pStat('Feitas até hoje',fh(hFeitas)+'h')+
        pStat('Média / dia',fh(media)+'h')+
        pStat('Projeção final','<span style="color:'+cor+'">'+fh(projecao)+'h</span>')+
        pStat('Meta do mês',fh(hProgTotal)+'h')+
        pStat('Dias passados',passados.length)+
        pStat('Dias restantes',futuros.length)+
      '</div>'+
      '<div class="proj-prog-wrap">'+
        '<div class="proj-prog-bar" style="width:'+pctFeito+'%;background:'+cor+'"></div>'+
        '<div class="proj-proj-bar" style="left:'+pctFeito+'%;width:'+pctProj+'%;background:'+cor+'"></div>'+
      '</div>'+
      '<div class="proj-footer"><span>0h</span><span style="color:'+cor+'">▲ '+fh(projecao)+'h projetado</span><span>meta: '+fh(hProgTotal)+'h</span></div>'+
    '</div>';
  } else {
    // Meses passados: mostra resumo fechado
    var diffH=hFeitas-hProgTotal, diffV=vFeito-vProg;
    var ok=diffH>=0;
    var cor=ok?'var(--green)':'var(--red)';
    var pct=hProgTotal>0?Math.min(hFeitas/hProgTotal*100,100):0;
    return '<div class="proj-card">'+
      '<div class="proj-top">'+
        '<div><div class="proj-label">Resumo — '+lbl+'</div>'+
        '<div class="proj-title">'+(ok?'✓ Meta atingida':'✗ Meta não atingida')+'</div></div>'+
        '<div class="proj-badge" style="background:'+(ok?'var(--green-bg)':'var(--red-bg)')+';color:'+cor+'">'+(diffH>=0?'+':'')+fh(diffH)+'h vs meta</div>'+
      '</div>'+
      '<div class="proj-stats">'+
        pStat('Total feito',fh(hFeitas)+'h')+
        pStat('Meta',fh(hProgTotal)+'h')+
        pStat('Diferença','<span style="color:'+cor+'">'+(diffH>=0?'+':'')+fh(diffH)+'h</span>')+
        pStat('Val. programado',fr(vProg))+
        pStat('Val. feito',fr(vFeito))+
        pStat('Saldo','<span style="color:'+(diffV>=0?'var(--green)':'var(--red)')+'">'+(diffV>=0?'+':'')+fr(diffV)+'</span>')+
      '</div>'+
      '<div class="proj-prog-wrap">'+
        '<div class="proj-prog-bar" style="width:'+pct.toFixed(1)+'%;background:'+cor+'"></div>'+
      '</div>'+
      '<div class="proj-footer"><span>0h</span><span style="color:'+cor+'">'+pct.toFixed(1)+'% realizado</span><span>'+totalDias+' dias</span></div>'+
    '</div>';
  }
}
function pStat(lbl,val){return '<div><div class="proj-stat-label">'+lbl+'</div><div class="proj-stat-val">'+val+'</div></div>';}

// MES TABS
function construirMesTabs(){
  var meses={};
  STATE.registros.forEach(function(r){
    if(!meses[r.mesAno]){
      var p=r.mesAno.split('-');
      var lbl=new Date(Number(p[0]),Number(p[1])-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      meses[r.mesAno]=lbl.charAt(0).toUpperCase()+lbl.slice(1);
    }
  });
  var sorted=Object.keys(meses).sort();
  var h='<div class="mes-tab '+(mesSel==='todos'?'active':'')+'" onclick="setMes(\'todos\')">Todos</div>';
  sorted.forEach(function(k){
    h+='<div class="mes-tab '+(mesSel===k?'active':'')+'" onclick="setMes(\''+k+'\')">'+meses[k]+'</div>';
  });
  document.getElementById('mes-tabs').innerHTML=h;
}
function setMes(k){mesSel=k;construirMesTabs();aplicarFiltros();}

function aplicarFiltros(){
  var d=norm(document.getElementById('sel-dia').value);
  pagina=1;
  filtrados=STATE.registros.filter(function(r){
    if(mesSel!=='todos'&&r.mesAno!==mesSel) return false;
    if(d&&r.diaNorm!==d) return false;
    return true;
  });
  var hoje=dataHoje();
  var mesKey=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');
  var mostra=mesSel==='todos'||mesSel===mesKey||STATE.monthly.some(function(m){return m.key===mesSel;});
  document.getElementById('proj-wrap').innerHTML=mostra?renderProjecao():'';
  renderTabela();
}

function renderTabela(){
  var ini=(pagina-1)*POR_PAG,fim=ini+POR_PAG,pag=filtrados.slice(ini,fim),tot=filtrados.length;
  document.getElementById('tbl-count').textContent=tot+' registros';
  document.getElementById('pag-info').textContent=(ini+1)+'–'+Math.min(fim,tot)+' de '+tot;
  document.getElementById('btn-prev').disabled=pagina===1;
  document.getElementById('btn-next').disabled=fim>=tot;
  function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
  var lastMes='',h='';
  pag.forEach(function(r){
    if(r.mesAno!==lastMes){
      var p=r.mesAno.split('-');
      var lbl=new Date(Number(p[0]),Number(p[1])-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      h+='<tr><td class="td-month-sep" colspan="7">'+lbl.charAt(0).toUpperCase()+lbl.slice(1)+'</td></tr>';
      lastMes=r.mesAno;
    }
    var futuro=isFuturo(r),hoje=isHoje(r);
    var isFDS=FDS.indexOf(r.diaNorm)>=0;
    var dH=r.hFeit-r.hProg,dcl=dH>0?'g':dH<0?'rd':'';
    if(futuro){
      h+='<tr style="opacity:.35">'+
        '<td class="mu">'+r.data+'</td>'+
        '<td><span class="dbadge '+(isFDS?'we':'wd')+'">'+cap(r.dia)+'</span></td>'+
        '<td class="r mu">'+fh(r.hProg)+'h</td>'+
        '<td class="r zo" style="text-align:right">—</td>'+
        '<td class="r zo" style="text-align:right">⏱</td>'+
        '<td class="r zo" style="text-align:right">—</td>'+
        '<td class="r zo" style="text-align:right">—</td>'+
      '</tr>';
    } else {
      h+='<tr'+(hoje?' class="row-hoje"':'')+'>'+
        '<td class="mu">'+r.data+(hoje?' <span class="hoje-pill">hoje</span>':'')+'</td>'+
        '<td><span class="dbadge '+(isFDS?'we':'wd')+'">'+cap(r.dia)+'</span></td>'+
        '<td class="r">'+fh(r.hProg)+'h</td>'+
        '<td class="r '+(r.hFeit===0?'zo':'')+'">'+fh(r.hFeit)+'h</td>'+
        '<td class="r '+dcl+'">'+(dH>=0?'+':'')+fh(dH)+'h</td>'+
        '<td class="r">'+fr(r.vProg)+'</td>'+
        '<td class="r '+(r.vFeit===0?'zo':'')+'">'+fr(r.vFeit)+'</td>'+
      '</tr>';
    }
  });
  document.getElementById('tbody').innerHTML=h;
}

// ── ANÁLISE ───────────────────────────────────────────────────
function renderAnalise(){
  var M=STATE.monthly, R=STATE.registros;
  if(!M.length){ document.getElementById('analise-content').innerHTML=''; return; }

  var hoje=dataHoje();
  var mesAtualKey=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');

  // Totais gerais — só dias passados
  var passados=R.filter(function(r){return !isFuturo(r);});
  var totHP=passados.reduce(function(s,r){return s+r.hProg;},0);
  var totHF=passados.reduce(function(s,r){return s+r.hFeit;},0);
  var totVP=passados.reduce(function(s,r){return s+r.vProg;},0);
  var totVF=passados.reduce(function(s,r){return s+r.vFeit;},0);
  var taxaGeral=totHP>0?(totHF/totHP*100):0;
  var comHora=passados.filter(function(r){return r.hFeit>0;});
  var semHora=passados.filter(function(r){return r.hFeit===0;});
  var taxaDias=passados.length>0?(comHora.length/passados.length*100):0;

  // Melhor e pior dia
  var comHoraSort=comHora.slice().sort(function(a,b){return b.hFeit-a.hFeit;});
  var melhorDia=comHoraSort[0];
  var piorDia=comHoraSort[comHoraSort.length-1];

  // Média por dia da semana
  var porDia={};
  comHora.forEach(function(r){
    var d=r.diaNorm;
    if(!porDia[d]){porDia[d]={total:0,count:0,nome:r.dia};}
    porDia[d].total+=r.hFeit; porDia[d].count++;
  });
  var rankDias=Object.values(porDia).map(function(d){
    return {nome:d.nome,media:d.total/d.count,total:d.total,count:d.count};
  }).sort(function(a,b){return b.media-a.media;});

  // Melhor mês
  var melhorMes=M.slice().sort(function(a,b){return b.pct-a.pct;})[0];
  var piorMes=M.slice().sort(function(a,b){return a.pct-b.pct;})[0];

  // Tendência: comparar últimos 2 meses completos
  var mesesCompletos=M.filter(function(m){return m.key!==mesAtualKey;});
  var tendencia=null;
  if(mesesCompletos.length>=2){
    var ult=mesesCompletos[mesesCompletos.length-1];
    var penult=mesesCompletos[mesesCompletos.length-2];
    tendencia={diff:ult.hFeito-penult.hFeito, pct:penult.hFeito>0?((ult.hFeito-penult.hFeito)/penult.hFeito*100):0, m1:penult.mes, m2:ult.mes};
  }

  // Sequência atual de dias com hora extra
  var regOrdem=passados.slice().sort(function(a,b){return parseDataBR(b.data)-parseDataBR(a.data);});
  var sequencia=0;
  for(var i=0;i<regOrdem.length;i++){
    if(regOrdem[i].hFeit>0) sequencia++;
    else break;
  }

  // Maior sequência histórica
  var regCron=passados.slice().sort(function(a,b){return parseDataBR(a.data)-parseDataBR(b.data);});
  var maiorSeq=0, seqTemp=0;
  regCron.forEach(function(r){ if(r.hFeit>0){seqTemp++;if(seqTemp>maiorSeq)maiorSeq=seqTemp;}else{seqTemp=0;} });

  // Média diária geral
  var mediaDiariaGeral=comHora.length>0?(totHF/comHora.length):0;

  // Fim de semana vs semana
  var fds=comHora.filter(function(r){return FDS.indexOf(r.diaNorm)>=0;});
  var semana=comHora.filter(function(r){return FDS.indexOf(r.diaNorm)<0;});
  var mediaFDS=fds.length>0?(fds.reduce(function(s,r){return s+r.hFeit;},0)/fds.length):0;
  var mediaSemana=semana.length>0?(semana.reduce(function(s,r){return s+r.hFeit;},0)/semana.length):0;

  function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}

  // ── MONTA O HTML ─────────────────────────────────────────────
  var html='';

  // Bloco 1: cards de insight
  html+='<div class="analise-grid">';

  // Taxa de realização
  var tcls=taxaGeral>=100?'green':taxaGeral>=80?'amber':'red';
  html+=insightCard(tcls,
    taxaGeral>=100?'🎯':taxaGeral>=80?'⚡':'⚠️',
    'Taxa de Realização',
    taxaGeral.toFixed(1)+'%',tcls,
    'Do total programado, <strong>'+fh(totHF)+'h</strong> foram realizadas de <strong>'+fh(totHP)+'h</strong> previstas.'
  );

  // Saldo financeiro
  var saldo=totVF-totVP, scls=saldo>=0?'green':'red';
  html+=insightCard(scls,
    saldo>=0?'💰':'📉',
    'Saldo Financeiro',
    (saldo>=0?'+':'')+fr(saldo),scls,
    saldo>=0
      ?'Você recebeu <strong>'+fr(Math.abs(saldo))+'</strong> acima do programado.'
      :'Faltaram <strong>'+fr(Math.abs(saldo))+'</strong> para atingir o valor programado.'
  );

  // Dias ativos
  html+=insightCard('blue','📅','Dias com Hora Extra',
    comHora.length+' dias','blue',
    taxaDias.toFixed(1)+'% dos dias trabalhados tiveram hora extra. '+semHora.length+' dia(s) sem registro.'
  );

  // Média diária
  html+=insightCard('amber','⏱','Média por Dia Ativo',
    fh(mediaDiariaGeral)+'h','amber',
    'Nos dias com hora extra, a média foi de <strong>'+fh(mediaDiariaGeral)+'h</strong>. Fim de semana: '+fh(mediaFDS)+'h | Semana: '+fh(mediaSemana)+'h.'
  );

  // Sequência atual
  var seqCls=sequencia>=5?'green':sequencia>=2?'amber':'red';
  html+=insightCard(seqCls,'🔥','Sequência Atual',
    sequencia+' dias',seqCls,
    (sequencia>0?'<strong>'+sequencia+' dia(s) consecutivos</strong> com hora extra até hoje.':'Nenhum dia consecutivo com hora extra no momento.')+
    ' Recorde histórico: <strong>'+maiorSeq+' dias</strong>.'
  );

  // Tendência
  if(tendencia){
    var tcls2=tendencia.diff>=0?'green':'red';
    html+=insightCard(tcls2,tendencia.diff>=0?'📈':'📉','Tendência',
      (tendencia.diff>=0?'+':'')+fh(tendencia.diff)+'h',tcls2,
      'Comparando <strong>'+tendencia.m1.substring(0,3)+'</strong> com <strong>'+tendencia.m2.substring(0,3)+'</strong>: variação de <strong>'+(tendencia.pct>=0?'+':'')+tendencia.pct.toFixed(1)+'%</strong>.'
    );
  }

  html+='</div>';

  // Bloco 2: Ranking por dia da semana
  if(rankDias.length){
    var maxMedia=rankDias[0].media;
    html+='<div class="ranking-card"><div class="ranking-title">Média de Horas por Dia da Semana</div>';
    rankDias.forEach(function(d,i){
      var cor=i===0?'var(--green)':i===rankDias.length-1?'var(--red)':'var(--accent)';
      var w=(d.media/maxMedia*100).toFixed(1);
      html+='<div class="ranking-row">'+
        '<div class="ranking-pos">'+(i+1)+'º</div>'+
        '<div class="ranking-label">'+cap(d.nome)+'</div>'+
        '<div class="ranking-bar-track"><div class="ranking-bar-fill" data-w="'+w+'" style="width:0%;background:'+cor+'"></div></div>'+
        '<div class="ranking-val" style="color:'+cor+'">'+fh(d.media)+'h</div>'+
      '</div>';
    });
    html+='</div>';
  }

  // Bloco 3: Melhores e piores dias individuais
  html+='<div class="analise-grid">';
  // Top 5 melhores dias
  html+='<div class="ranking-card" style="margin-bottom:0"><div class="ranking-title">🏆 Top 5 — Melhores Dias</div>';
  comHoraSort.slice(0,5).forEach(function(r,i){
    var w=(r.hFeit/comHoraSort[0].hFeit*100).toFixed(1);
    html+='<div class="ranking-row">'+
      '<div class="ranking-pos">'+(i+1)+'º</div>'+
      '<div class="ranking-label"><div style="font-size:12px">'+r.data+'</div><div style="font-size:10px;color:var(--muted)">'+cap(r.dia)+'</div></div>'+
      '<div class="ranking-bar-track"><div class="ranking-bar-fill" data-w="'+w+'" style="width:0%;background:var(--green)"></div></div>'+
      '<div class="ranking-val" style="color:var(--green)">'+fh(r.hFeit)+'h</div>'+
    '</div>';
  });
  html+='</div>';

  // Top 5 piores dias (com hora > 0, menores valores)
  html+='<div class="ranking-card" style="margin-bottom:0"><div class="ranking-title">📉 Top 5 — Dias Mais Fracos</div>';
  comHoraSort.slice(-5).reverse().forEach(function(r,i){
    var w=(r.hFeit/comHoraSort[0].hFeit*100).toFixed(1);
    html+='<div class="ranking-row">'+
      '<div class="ranking-pos">'+(i+1)+'º</div>'+
      '<div class="ranking-label"><div style="font-size:12px">'+r.data+'</div><div style="font-size:10px;color:var(--muted)">'+cap(r.dia)+'</div></div>'+
      '<div class="ranking-bar-track"><div class="ranking-bar-fill" data-w="'+w+'" style="width:0%;background:var(--red)"></div></div>'+
      '<div class="ranking-val" style="color:var(--red)">'+fh(r.hFeit)+'h</div>'+
    '</div>';
  });
  html+='</div>';
  html+='</div>';

  // Bloco 4: Alertas e observações
  var alertas=[];

  if(taxaGeral>=100) alertas.push({tipo:'ok',txt:'<strong>Meta geral atingida!</strong> Você realizou '+taxaGeral.toFixed(1)+'% do total programado.'});
  else if(taxaGeral>=90) alertas.push({tipo:'warn',txt:'<strong>Quase lá!</strong> Taxa geral de '+taxaGeral.toFixed(1)+'% — faltam apenas '+fh(totHP-totHF)+'h para bater a meta.'});
  else alertas.push({tipo:'bad',txt:'<strong>Meta não atingida.</strong> Taxa de realização em '+taxaGeral.toFixed(1)+'% — diferença de '+fh(totHP-totHF)+'h.'});

  if(melhorMes) alertas.push({tipo:'ok',txt:'<strong>Melhor mês:</strong> '+melhorMes.mes+' com '+melhorMes.pct.toFixed(1)+'% acima do programado ('+fr(melhorMes.vFeito)+' realizados).'});
  if(piorMes&&piorMes.key!==melhorMes.key) alertas.push({tipo:piorMes.pct>=0?'warn':'bad',txt:'<strong>Mês mais fraco:</strong> '+piorMes.mes+' com '+(piorMes.pct>=0?'+':'')+piorMes.pct.toFixed(1)+'% em relação ao programado.'});

  if(mediaFDS>mediaSemana) alertas.push({tipo:'ok',txt:'<strong>Fim de semana mais produtivo:</strong> média de '+fh(mediaFDS)+'h/dia no FDS vs '+fh(mediaSemana)+'h/dia na semana.'});
  else if(mediaSemana>0) alertas.push({tipo:'warn',txt:'<strong>Semana mais produtiva que FDS:</strong> '+fh(mediaSemana)+'h/dia na semana vs '+fh(mediaFDS)+'h/dia no FDS.'});

  if(semHora.length>10) alertas.push({tipo:'bad',txt:'<strong>'+semHora.length+' dias sem hora extra</strong> registrados. Verifique se há lançamentos pendentes.'});

  if(tendencia&&tendencia.diff<0) alertas.push({tipo:'warn',txt:'<strong>Queda de desempenho:</strong> '+tendencia.m2.substring(0,3)+' teve '+fh(Math.abs(tendencia.diff))+'h a menos que '+tendencia.m1.substring(0,3)+'.'});
  if(tendencia&&tendencia.diff>0) alertas.push({tipo:'ok',txt:'<strong>Crescimento positivo:</strong> '+tendencia.m2.substring(0,3)+' superou '+tendencia.m1.substring(0,3)+' em '+fh(tendencia.diff)+'h.'});

  html+='<div class="alerta-card"><div class="alerta-title">Observações do Sistema</div>';
  alertas.forEach(function(a){
    html+='<div class="alerta-row '+a.tipo+'"><div class="alerta-dot"></div><div class="alerta-txt">'+a.txt+'</div></div>';
  });
  html+='</div>';

  document.getElementById('analise-content').innerHTML=html;
  setTimeout(function(){
    document.querySelectorAll('.ranking-bar-fill[data-w]').forEach(function(b){b.style.width=b.dataset.w+'%';});
  },80);
}

function insightCard(cls,icon,title,val,vcls,desc){
  return '<div class="insight-card '+cls+'">'+
    '<div class="insight-icon">'+icon+'</div>'+
    '<div class="insight-title">'+title+'</div>'+
    '<div class="insight-val '+vcls+'">'+val+'</div>'+
    '<div class="insight-desc">'+desc+'</div>'+
  '</div>';
}

function trocarPag(dir){
  pagina+=dir;renderTabela();
  window.scrollTo({top:document.querySelector('.tbl-wrap').offsetTop-80,behavior:'smooth'});
}

function fh(v){return (v||0).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1});}
function fr(v){return 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function animBars(){document.querySelectorAll('.bar-fill[data-w]').forEach(function(b){b.style.width=b.dataset.w+'%';});}

function showTab(id,btn){
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  setTimeout(animBars,50);
  if(id==='mensal') setTimeout(function(){buildSpark(STATE.monthly);},80);
  if(id==='analise') setTimeout(function(){
    document.querySelectorAll('.ranking-bar-fill[data-w]').forEach(function(b){b.style.width=b.dataset.w+'%';});
  },80);
}

window.addEventListener('resize',function(){buildSpark(STATE.monthly);});
carregar();
</script>
